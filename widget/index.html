<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<script src="./lib/streamerbot-client.js"></script>
		<script defer src="./configs.js"></script>
		<script defer src="./scripts/pomodoro-view.js"></script>
		<script defer src="./scripts/streamerbot.js"></script>
		<link rel="stylesheet" href="./styles/structure.css" />
		<link rel="stylesheet" href="./styles/style.css" />
		<title>Pomodoro Timer</title>
	</head>
	<body data-phase="work">
		<div id="connection-error" class="connection-error" hidden>
			<span class="connection-error__title">Connection Error</span>
			<span class="connection-error__message"
				>Unable to connect to Streamer.bot</span
			>
		</div>
		<div id="main-container">
			<div id="timer">50:00</div>
			<div class="footer">
				<div id="phase-label">Work</div>
				<div id="pomodoro-count">Session 0/5</div>
			</div>
		</div>
	</body>
</html>
